<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lockscreen</title>
<style>
  :root{
    --teal: #7ee0c9;
    --teal-dim: rgba(126,224,201,0.65);
    --panel-bg: rgba(20,28,30,0.55);
    --panel-border: rgba(255,255,255,0.07);
    --text-dim: #9fb3b0;
    --text-bright: #e6f5f0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    font-family: 'JetBrains Mono','Fira Code',monospace;
    color:var(--text-bright);
    overflow:hidden;
  }
  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(20,80,70,0.55), transparent 40%),
      radial-gradient(circle at 80% 0%, rgba(60,30,40,0.4), transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(10,50,45,0.5), transparent 50%),
      #050a09;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  body::before{
    content:"";
    position:absolute;
    inset:0;
    backdrop-filter: blur(60px);
    background: rgba(0,0,0,0.25);
    z-index:0;
  }

  .frame{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns: 400px 440px 400px;
    gap:24px;
    padding:28px;
    background: rgba(8,14,14,0.45);
    border:1px solid var(--panel-border);
    border-radius:22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
  }

  .col{display:flex;flex-direction:column;gap:16px;}

  .card{
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:16px;
    padding:18px 20px;
  }

  /* Weather */
  .weather h3{
    margin:0 0 12px 0;
    color:var(--teal);
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
  }
  .weather .row{display:flex;align-items:center;gap:14px;}
  .weather svg{width:48px;height:48px;color:var(--text-dim);}
  .weather .cond{font-size:18px;color:var(--text-bright);margin:0;}
  .weather .hum{font-size:13px;color:var(--text-dim);margin:4px 0 0 0;}

  /* Fetch card */
  .fetch .head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .fetch .prompt{
    width:26px;height:26px;border-radius:50%;
    background:rgba(126,224,201,0.15);
    color:var(--teal);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;
  }
  .fetch .cmd{color:var(--text-dim);font-size:14px;}
  .fetch .body{display:flex;gap:18px;align-items:center;}
  .fetch .arch-logo{width:78px;height:78px;flex-shrink:0;}
  .fetch .specs{font-size:13px;line-height:1.85;color:var(--text-dim);}
  .fetch .specs b{color:var(--text-bright);font-weight:500;letter-spacing:0.5px;}
  .swatches{display:flex;gap:8px;margin-top:16px;}
  .swatches span{width:22px;height:22px;border-radius:6px;display:block;}

  /* Now playing */
  .nowplaying{position:relative;overflow:hidden;padding:0;}
  .nowplaying .bgart{
    position:absolute;inset:0;
    background: linear-gradient(135deg,#3a1014,#170608);
    opacity:0.55;
  }
  .nowplaying .content{position:relative;padding:18px 20px;z-index:1;}
  .nowplaying .label{font-size:13px;color:var(--text-dim);margin:0 0 10px 0;}
  .nowplaying .title{font-size:19px;font-weight:600;text-align:center;margin:0 0 4px 0;color:var(--text-bright);}
  .nowplaying .subtitle{font-size:13px;text-align:center;color:var(--text-dim);margin:0 0 16px 0;}
  .controls{display:flex;justify-content:center;align-items:center;gap:16px;}
  .controls button{
    border:none;cursor:pointer;
    width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.07);
    color:var(--text-bright);
    display:flex;align-items:center;justify-content:center;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .controls button:hover{transform:scale(1.06);}
  .controls .play{
    width:48px;height:48px;
    background:var(--teal);
    color:#03261d;
  }
  .controls svg{width:16px;height:16px;}

  /* Center column */
  .center{align-items:center;justify-content:center;text-align:center;gap:8px;}
  .clock{
    font-size:64px;
    font-weight:300;
    letter-spacing:1px;
    margin:30px 0 0 0;
    color:var(--text-bright);
  }
  .clock .ampm{font-size:24px;color:var(--teal);margin-left:8px;font-weight:500;}
  .date{
    font-size:18px;
    color:var(--text-dim);
    margin:6px 0 30px 0;
    letter-spacing:1px;
  }
  .avatar{
    width:200px;height:200px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    background:#111;
    margin-bottom:24px;
  }
  .avatar svg{width:100%;height:100%;}

  .pwbox{
    display:flex;align-items:center;gap:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:12px 18px;
    width:340px;
  }
  .pwbox .lock{color:var(--text-dim);flex-shrink:0;width:18px;height:18px;}
  .pwbox input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--text-bright);font-family:inherit;font-size:15px;
    letter-spacing:1px;
  }
  .pwbox input::placeholder{color:var(--text-dim);}
  .pwbox .arrow{
    width:30px;height:30px;border-radius:50%;
    background:rgba(255,255,255,0.07);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;flex-shrink:0;
  }

  /* Right column */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .stat{
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:16px;
    aspect-ratio:1;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .stat svg.ring{position:absolute;inset:0;width:100%;height:100%;}
  .stat svg.icon{width:34px;height:34px;color:var(--text-dim);position:relative;z-index:1;}

  .notif{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:30px 20px;}
  .notif .label{position:absolute;top:18px;left:20px;font-size:13px;color:var(--text-dim);}
  .notif{position:relative;}
  .notif-scene{display:flex;align-items:center;gap:14px;opacity:0.35;}
  .notif-scene .line{width:90px;height:1px;background:var(--text-dim);}
  .notif svg{width:38px;height:38px;color:var(--text-dim);}
  .notif p{margin:0;color:var(--text-dim);font-size:14px;letter-spacing:1px;}
</style>
</head>
<body>

<div class="frame">

  <!-- LEFT COLUMN -->
  <div class="col">
    <div class="card weather">
      <h3>Weather</h3>
      <div class="row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M6 18a4 4 0 0 1-.4-7.98A5 5 0 0 1 15 9a4.5 4.5 0 0 1 1 8.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div>
          <p class="cond">Overcast</p>
          <p class="hum">Humidity: 76%</p>
        </div>
      </div>
    </div>

    <div class="card fetch">
      <div class="head">
        <div class="prompt">&gt;</div>
        <span class="cmd">caelestiafetch.sh</span>
      </div>
      <div class="body">
        <svg class="arch-logo" viewBox="0 0 24 24" fill="#5fb3e0"><path d="M12 0L7.4 9.6 3 12.3l1.5.5L1 19.5l4.7-2.3.4 1.3 2-1 .9 2.5h6l.9-2.5 2 1 .4-1.3 4.7 2.3-3.5-6.7 1.5-.5-4.4-2.7z"/></svg>
        <div class="specs">
          OS&nbsp; : <b>Arch Linux</b><br>
          WM&nbsp; : <b>Hyprland</b><br>
          USER: <b>suyav</b><br>
          UP&nbsp; : <b>25 minutes</b>
        </div>
      </div>
      <div class="swatches">
        <span style="background:#3a3a3a"></span>
        <span style="background:#a8c93a"></span>
        <span style="background:#5fd9a8"></span>
        <span style="background:#7ee0c9"></span>
        <span style="background:#6f9b95"></span>
        <span style="background:#5b7fd6"></span>
        <span style="background:#7ee0c9"></span>
      </div>
    </div>

    <div class="card nowplaying">
      <div class="bgart"></div>
      <div class="content">
        <p class="label">Now playing</p>
        <p class="title">Chillhop Music</p>
        <p class="subtitle">nymano x Pandrezz — Fireworks</p>
        <div class="controls">
          <button class="prev" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6v12L10 12z"/></svg>
          </button>
          <button class="play" id="playBtn" title="Play/Pause">
            <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
          </button>
          <button class="next" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6v12l10-6z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER COLUMN -->
  <div class="col center">
    <div class="clock"><span id="time">--:--</span><span class="ampm" id="ampm">--</span></div>
    <div class="date" id="dateLine">Loading…</div>
    <div class="avatar">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="200" fill="#1a1a1a"/>
        <ellipse cx="100" cy="120" rx="55" ry="65" fill="#e8e0d8"/>
        <ellipse cx="80" cy="110" rx="6" ry="9" fill="#222"/>
        <ellipse cx="120" cy="110" rx="6" ry="9" fill="#222"/>
        <path d="M40 95 Q60 40 100 45 Q140 40 160 95 Q150 130 100 135 Q50 130 40 95Z" fill="#f2ecE4"/>
        <path d="M60 60 Q80 30 100 35 Q120 30 140 60" stroke="#ccc" stroke-width="2" fill="none" opacity="0.4"/>
      </svg>
    </div>
    <div class="pwbox">
      <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
      <input type="password" placeholder="Enter your password" id="pw">
      <div class="arrow" id="submitBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="col">
    <div class="stats-grid">
      <div class="stat" id="statCpu">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"/><circle cx="50" cy="50" r="42" fill="none" stroke="#7ee0c9" stroke-width="5" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="190" transform="rotate(-90 50 50)"/></svg>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="7" y="7" width="10" height="10" rx="1"/><rect x="10" y="10" width="4" height="4"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>
      </div>
      <div class="stat" id="statTemp">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"/><circle cx="50" cy="50" r="42" fill="none" stroke="#9fb3b0" stroke-width="5" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="220" transform="rotate(-90 50 50)"/></svg>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M12 3v10M9 14a3 3 0 1 0 6 0c0-1.5-1-2-1.5-3V5a1.5 1.5 0 0 0-3 0v6c-.5 1-1.5 1.5-1.5 3Z"/><path d="M5 8h2M5 12h2"/></svg>
      </div>
      <div class="stat" id="statDisk">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"/><circle cx="50" cy="50" r="42" fill="none" stroke="#7ee0c9" stroke-width="5" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="230" transform="rotate(-90 50 50)"/></svg>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><circle cx="7" cy="7" r="0.8" fill="currentColor"/><circle cx="7" cy="17" r="0.8" fill="currentColor"/></svg>
      </div>
      <div class="stat" id="statMem">
        <svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"/><circle cx="50" cy="50" r="42" fill="none" stroke="#9fb3b0" stroke-width="5" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="200" transform="rotate(-90 50 50)"/></svg>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="6" y="3" width="12" height="18" rx="2"/><circle cx="12" cy="18" r="0.8" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="card notif">
      <span class="label">Notifications</span>
      <div class="notif-scene">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18a4 4 0 0 1-.4-7.98A5 5 0 0 1 15 9a4.5 4.5 0 0 1 1 8.9z"/></svg>
      </div>
      <div class="notif-scene">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 20c2-6 2-10 5-10s2 5 5 5 2-7 6-7"/></svg>
        <div class="line"></div>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2v18M8 6l4-4 4 4M7 22h10M9 14h6"/></svg>
      </div>
      <p>No Notifications</p>
    </div>
  </div>

</div>

<script>
function updateClock(){
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  document.getElementById('time').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  document.getElementById('ampm').textContent = ampm;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateLine').textContent =
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

let playing = true;
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  const icon = document.getElementById('playIcon');
  icon.innerHTML = playing
    ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
    : '<path d="M7 5l12 7-12 7z"/>';
});

document.getElementById('submitBtn').addEventListener('click', () => {
  const box = document.querySelector('.pwbox');
  box.style.transition = 'transform 0.1s';
  box.style.transform = 'translateX(-6px)';
  setTimeout(() => box.style.transform = 'translateX(6px)', 100);
  setTimeout(() => box.style.transform = 'translateX(0)', 200);
});
</script>

</body>
</html>
